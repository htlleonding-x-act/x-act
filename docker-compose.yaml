services:
  postgres:
    image: postgres:16-alpine
    container_name: xact-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: xact_db
    ports:
      - "6767:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d xact_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: xact-keycloak
    command: start-dev
    restart: always
    environment:
      # HIER KORRIGIERT: Die korrekten Variablen für Keycloak 24+
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpassword
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/xact_db
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: supersecretpassword
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xact-backend
    restart: always
    ports:
      - "5200:5200"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=xact_db;Username=admin;Password=supersecretpassword
      - Authentication__Authority=http://keycloak:8080/realms/xact
      - Authentication__ValidIssuer=http://localhost:8080/realms/xact
      - Authentication__RequireHttpsMetadata=false
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data: